stages:
  - validate

validate:
  stage: validate
  image: node:20-bookworm
  before_script:
    - apt-get update && apt-get install -y golang-go python3 python3-pip curl
    - npm install -g pnpm
    - pip3 install uv
    - pnpm install
    - uv sync
  script:
    - go test ./...
    - uv run pytest
    - pnpm build

