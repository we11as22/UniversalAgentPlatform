name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.2"
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install
          uv sync
      - name: Go tests
        run: go test ./...
      - name: Python tests
        run: uv run pytest
      - name: Frontend type validation
        run: pnpm build
      - name: Compose config validation
        run: |
          docker compose -f infra/docker-compose/compose.base.yml config >/dev/null
          docker compose -f infra/docker-compose/compose.base.yml -f infra/docker-compose/compose.local-api.yml config >/dev/null

