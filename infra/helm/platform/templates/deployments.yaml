{{- range $name, $cfg := .Values.deployments }}
{{- if ne (default true $cfg.enabled) false }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "uap.workloadLabels" (dict "root" $ "name" $name "mesh" ($cfg.mesh | default false)) | nindent 4 }}
spec:
  replicas: {{ default 1 $cfg.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "uap.workloadLabels" (dict "root" $ "name" $name "mesh" ($cfg.mesh | default false)) | nindent 8 }}
      annotations:
        {{- if $cfg.mesh }}
        sidecar.istio.io/inject: "true"
        {{- end }}
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/health
        prometheus.io/port: {{ (index $cfg.containerPorts 0).containerPort | quote }}
    spec:
      serviceAccountName: {{ include "uap.serviceAccountName" (dict "name" $name) }}
      containers:
        - name: {{ $name }}
          image: "{{ $cfg.image.repository }}:{{ $cfg.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          {{- with $cfg.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cfg.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cfg.containerPorts }}
          ports:
            {{- range . }}
            - name: {{ .name }}
              containerPort: {{ .containerPort }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
          {{- end }}
          {{- if $cfg.env }}
          env:
            {{- range $env := $cfg.env }}
            - name: {{ $env.name }}
              {{- if hasKey $env "value" }}
              value: {{ tpl $env.value $ | quote }}
              {{- else if hasKey $env "secretKeyRef" }}
              valueFrom:
                secretKeyRef:
                  name: {{ $env.secretKeyRef.name }}
                  key: {{ $env.secretKeyRef.key }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- with $cfg.volumeMounts }}
          volumeMounts:
            {{- range . }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if hasKey . "subPath" }}
              subPath: {{ .subPath }}
              {{- end }}
              {{- if hasKey . "readOnly" }}
              readOnly: {{ .readOnly }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- with $cfg.probes.startup }}
          startupProbe:
            {{- if .tcpSocket }}
            tcpSocket:
              port: {{ .port }}
            {{- else if .exec }}
            exec:
              command:
                {{- toYaml .exec.command | nindent 16 }}
            {{- else }}
            httpGet:
              path: {{ .path }}
              port: {{ .port }}
            {{- end }}
            failureThreshold: {{ .failureThreshold | default 12 }}
            periodSeconds: {{ .periodSeconds | default 10 }}
          {{- end }}
          {{- with $cfg.probes.readiness }}
          readinessProbe:
            {{- if .tcpSocket }}
            tcpSocket:
              port: {{ .port }}
            {{- else if .exec }}
            exec:
              command:
                {{- toYaml .exec.command | nindent 16 }}
            {{- else }}
            httpGet:
              path: {{ .path }}
              port: {{ .port }}
            {{- end }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
            periodSeconds: {{ .periodSeconds | default 10 }}
          {{- end }}
          {{- with $cfg.probes.liveness }}
          livenessProbe:
            {{- if .tcpSocket }}
            tcpSocket:
              port: {{ .port }}
            {{- else if .exec }}
            exec:
              command:
                {{- toYaml .exec.command | nindent 16 }}
            {{- else }}
            httpGet:
              path: {{ .path }}
              port: {{ .port }}
            {{- end }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 15 }}
            periodSeconds: {{ .periodSeconds | default 20 }}
          {{- end }}
          resources:
            {{- toYaml ($cfg.resources | default $.Values.global.defaultResources) | nindent 12 }}
      {{- with $cfg.volumes }}
      volumes:
        {{- range . }}
        - name: {{ .name }}
          {{- if hasKey . "configMap" }}
          configMap:
            name: {{ .configMap.name }}
            {{- if hasKey .configMap "defaultMode" }}
            defaultMode: {{ .configMap.defaultMode }}
            {{- end }}
          {{- else if hasKey . "emptyDir" }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- end }}
---
{{- end }}
{{- end }}
