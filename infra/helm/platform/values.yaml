    probes:
      readiness:
        path: /health/ready
        port: http
      liveness:
        path: /api/health
        port: http
  rag-service:
    replicas: 1
    mesh: true
    image:
      repository: uap/rag-service
      tag: dev
    containerPorts:
      - name: http
        containerPort: 8000
    service:
      enabled: true
      ports:
        - name: http
          port: 8000
          targetPort: http
    env:
      - name: SERVICE_PORT
        value: "8000"
      - name: QDRANT_URL
        value: http://qdrant:6333
    probes:
      readiness:
        path: /health/ready
        port: http
      liveness:
        path: /api/health
        port: http
  indexer:
    replicas: 1
    mesh: true
    image:
      repository: uap/indexer
      tag: dev
    containerPorts:
      - name: http
        containerPort: 8000
    service:
      enabled: true
      ports:
        - name: http
          port: 8000
          targetPort: http
    env:
      - name: SERVICE_PORT
        value: "8000"
      - name: QDRANT_URL
        value: http://qdrant:6333
      - name: MINIO_ENDPOINT
        value: http://minio:9000
    probes:
      readiness:
        path: /health/ready
        port: http
      liveness:
        path: /api/health
        port: http
  workflow-workers:
    replicas: 1
    mesh: true
    image:
      repository: uap/workflow-workers
      tag: dev
    containerPorts:
      - name: http
        containerPort: 8000
    service:
      enabled: true
      ports:
        - name: http
          port: 8000
          targetPort: http
    env:
      - name: SERVICE_PORT
        value: "8000"
      - name: DATABASE_URL
        secretKeyRef:
          name: uap-platform-secrets
          key: platform-database-url
      - name: TEMPORAL_ADDRESS
        secretKeyRef:
          name: uap-platform-secrets
          key: temporal-address
      - name: CHAT_GATEWAY_URL
        value: http://chat-gateway:8080
      - name: ADMIN_API_URL
        value: http://admin-api:8080
      - name: VOICE_GATEWAY_URL
        value: http://voice-gateway:8080
    probes:
      readiness:
        path: /health/ready
        port: http
      liveness:
        path: /api/health
        port: http
  temporal:
    replicas: 1
    image:
      repository: temporalio/auto-setup
      tag: 1.26.2
    containerPorts:
      - name: grpc
        containerPort: 7233
    service:
      enabled: true
      ports:
        - name: grpc
          port: 7233
          targetPort: grpc
    env:
      - name: DB
        value: postgresql12
      - name: DB_PORT
        value: "5432"
      - name: POSTGRES_USER
        secretKeyRef:
          name: uap-platform-secrets
          key: postgres-user
      - name: POSTGRES_PWD
        secretKeyRef:
          name: uap-platform-secrets
          key: postgres-password
      - name: POSTGRES_SEEDS
        value: postgres
      - name: DYNAMIC_CONFIG_FILE_PATH
        value: config/dynamicconfig/development-sql.yaml
    volumes:
      - name: temporal-dynamicconfig
        configMap:
          name: temporal-dynamicconfig
    volumeMounts:
      - name: temporal-dynamicconfig
        mountPath: /etc/temporal/config/dynamicconfig
        readOnly: true
    probes:
      readiness:
        tcpSocket: true
        port: grpc
      liveness:
        tcpSocket: true
        port: grpc
  temporal-ui:
    replicas: 1
    image:
      repository: temporalio/ui
      tag: 2.34.0
    containerPorts:
      - name: http
        containerPort: 8080
    service:
      enabled: true
      ports:
        - name: http
          port: 8080
          targetPort: http
    env:
      - name: TEMPORAL_ADDRESS
        value: temporal:7233
    probes:
      readiness:
        path: /
        port: http
      liveness:
        path: /
        port: http
  keycloak:
    replicas: 1
    image:
      repository: quay.io/keycloak/keycloak
      tag: 26.1.2
    containerPorts:
      - name: http
        containerPort: 8080
    service:
      enabled: true
      ports:
        - name: http
          port: 8080
          targetPort: http
    command:
      - /opt/keycloak/bin/kc.sh
    args:
      - start
      - --http-enabled=true
      - --hostname-strict=false
      - --proxy-headers=xforwarded
      - --import-realm
      - --health-enabled=true
      - --metrics-enabled=true
    env:
      - name: KEYCLOAK_ADMIN
        secretKeyRef:
          name: uap-platform-secrets
          key: keycloak-admin-user
      - name: KEYCLOAK_ADMIN_PASSWORD
        secretKeyRef:
          name: uap-platform-secrets
          key: keycloak-admin-password
      - name: KC_DB
        value: postgres
      - name: KC_DB_URL_HOST
        value: postgres
      - name: KC_DB_URL_PORT
        value: "5432"
      - name: KC_DB_URL_DATABASE
        secretKeyRef:
          name: uap-platform-secrets
          key: postgres-database
      - name: KC_DB_USERNAME
        secretKeyRef:
          name: uap-platform-secrets
          key: postgres-user
      - name: KC_DB_PASSWORD
        secretKeyRef:
          name: uap-platform-secrets
          key: postgres-password
      - name: KC_HEALTH_ENABLED
        value: "true"
      - name: KC_METRICS_ENABLED
        value: "true"
    volumes:
      - name: keycloak-realm
        configMap:
          name: keycloak-realm
    volumeMounts:
      - name: keycloak-realm
        mountPath: /opt/keycloak/data/import
        readOnly: true
    probes:
      startup:
        path: /health/started
        port: http
        failureThreshold: 60
        periodSeconds: 5
      readiness:
        path: /health/ready
        port: http
      liveness:
        path: /health/live
        port: http
  livekit:
    replicas: 1
    image:
      repository: livekit/livekit-server
      tag: v1.8.3
    containerPorts:
      - name: http
        containerPort: 7880
      - name: rtc
        containerPort: 7881
        protocol: UDP
    service:
      enabled: true
      type: NodePort
      ports:
        - name: http
          port: 7880
          targetPort: http
          nodePort: 30090
        - name: rtc
          port: 7881
          targetPort: rtc
          protocol: UDP
          nodePort: 30091
    args:
      - --config
      - /etc/livekit/livekit.yaml
    volumes:
      - name: livekit-config
        configMap:
          name: livekit-config
    volumeMounts:
      - name: livekit-config
        mountPath: /etc/livekit
        readOnly: true
    probes:
      readiness:
        tcpSocket: true
        port: http
      liveness:
        tcpSocket: true
        port: http
  otel-collector:
    replicas: 1
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: 0.120.0
    command:
      - /otelcol-contrib
    args:
      - --config=/etc/otelcol/config.yaml
    containerPorts:
      - name: grpc
        containerPort: 4317
      - name: http
        containerPort: 4318
    service:
      enabled: true
      ports:
        - name: grpc
          port: 4317
          targetPort: grpc
        - name: http
          port: 4318
          targetPort: http
    volumes:
      - name: otel-config
        configMap:
          name: otel-collector-config
    volumeMounts:
      - name: otel-config
        mountPath: /etc/otelcol
        readOnly: true
    probes:
      readiness:
        tcpSocket: true
        port: grpc
      liveness:
        tcpSocket: true
        port: grpc
  prometheus:
    replicas: 1
    image:
      repository: prom/prometheus
      tag: v3.2.1
    command:
      - /bin/prometheus
    args:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    containerPorts:
      - name: http
        containerPort: 9090
    service:
      enabled: true
      ports:
        - name: http
          port: 9090
          targetPort: http
    volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-data
        emptyDir: {}
    volumeMounts:
      - name: prometheus-config
        mountPath: /etc/prometheus
        readOnly: true
      - name: prometheus-data
        mountPath: /prometheus
    probes:
      readiness:
        path: /-/ready
        port: http
      liveness:
        path: /-/healthy
        port: http
  loki:
    replicas: 1
    image:
      repository: grafana/loki
      tag: 3.4.2
    args:
      - -config.file=/etc/loki/loki-config.yml
    containerPorts:
      - name: http
        containerPort: 3100
    service:
      enabled: true
      ports:
        - name: http
          port: 3100
          targetPort: http
    volumes:
      - name: loki-config
        configMap:
          name: loki-config
      - name: loki-data
        emptyDir: {}
    volumeMounts:
      - name: loki-config
        mountPath: /etc/loki
        readOnly: true
      - name: loki-data
        mountPath: /tmp/loki
    probes:
      readiness:
        path: /ready
        port: http
      liveness:
