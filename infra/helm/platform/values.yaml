global:
  namespace: uap
  imagePullPolicy: IfNotPresent
  baseDomain: uap.localtest.me
  publicScheme: http
  livekitScheme: ws
  externalPort: 8088
  livekitPort: 17880
  livekitRtcPort: 17881
  defaultResources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  defaultStatefulResources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

secrets:
  platformDatabaseURL: postgres://uap:uap@postgres:5432/uap?sslmode=disable
  redisURL: redis://redis:6379/0
  clickhouseDsn: http://clickhouse:8123
  temporalAddress: temporal:7233
  postgresUser: uap
  postgresPassword: uap
  postgresDatabase: uap
  keycloakAdminUser: admin
  keycloakAdminPassword: admin
  grafanaAdminUser: admin
  grafanaAdminPassword: admin
  minioRootUser: minio
  minioRootPassword: minio123
  livekitApiKey: devkey
  livekitApiSecret: devsecret

gateway:
  enabled: true
  className: eg
  name: uap-gateway
  routes:
    - name: chat-web
      hostname: chat.{{ .Values.global.baseDomain }}
      service: chat-web
      port: 3200
      path: /
    - name: admin-web
      hostname: admin.{{ .Values.global.baseDomain }}
      service: admin-web
      port: 3300
      path: /
    - name: chat-api
      hostname: api.{{ .Values.global.baseDomain }}
      service: chat-gateway
      port: 8080
      path: /
    - name: admin-api
      hostname: admin-api.{{ .Values.global.baseDomain }}
      service: admin-api
      port: 8080
      path: /
    - name: voice-api
      hostname: voice.{{ .Values.global.baseDomain }}
      service: voice-gateway
      port: 8080
      path: /
    - name: grafana
      hostname: grafana.{{ .Values.global.baseDomain }}
      service: grafana
      port: 3000
      path: /
    - name: prometheus
      hostname: prometheus.{{ .Values.global.baseDomain }}
      service: prometheus
      port: 9090
      path: /
    - name: keycloak
      hostname: keycloak.{{ .Values.global.baseDomain }}
      service: keycloak
      port: 8080
      path: /
    - name: temporal
      hostname: temporal.{{ .Values.global.baseDomain }}
      service: temporal-ui
      port: 8080
      path: /
    - name: minio
      hostname: minio.{{ .Values.global.baseDomain }}
      service: minio
      port: 9001
      path: /

mesh:
  enabled: true
  mtlsMode: STRICT

deployments:
  admin-web:
    replicas: 1
    mesh: true
    image:
      repository: uap/admin-web
      tag: dev
    containerPorts:
      - name: http
        containerPort: 3300
    service:
      enabled: true
      ports:
        - name: http
          port: 3300
          targetPort: http
    env:
      - name: PORT
        value: "3300"
      - name: NEXT_PUBLIC_ADMIN_API_BASE_URL
        value: '{{ .Values.global.publicScheme }}://admin-api.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: NEXT_PUBLIC_GRAFANA_URL
        value: '{{ .Values.global.publicScheme }}://grafana.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: NEXT_PUBLIC_CHAT_WEB_URL
        value: '{{ .Values.global.publicScheme }}://chat.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: NEXT_PUBLIC_KEYCLOAK_ADMIN_URL
        value: '{{ .Values.global.publicScheme }}://keycloak.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}/admin'
      - name: NEXT_PUBLIC_TEMPORAL_UI_URL
        value: '{{ .Values.global.publicScheme }}://temporal.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: NEXT_PUBLIC_PROMETHEUS_URL
        value: '{{ .Values.global.publicScheme }}://prometheus.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: NEXT_PUBLIC_MINIO_CONSOLE_URL
        value: '{{ .Values.global.publicScheme }}://minio.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: NEXT_PUBLIC_LIVEKIT_HTTP_URL
        value: '{{ .Values.global.publicScheme }}://livekit.{{ .Values.global.baseDomain }}:{{ .Values.global.livekitPort }}'
      - name: KEYCLOAK_URL
        value: '{{ .Values.global.publicScheme }}://keycloak.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: KEYCLOAK_REALM
        value: uap
    probes:
      startup:
        path: /api/health
        port: http
        failureThreshold: 30
        periodSeconds: 5
      readiness:
        path: /api/health
        port: http
      liveness:
        path: /api/health
        port: http
  chat-web:
    replicas: 1
    mesh: true
    image:
      repository: uap/chat-web
      tag: dev
    containerPorts:
      - name: http
        containerPort: 3200
    service:
      enabled: true
      ports:
        - name: http
          port: 3200
          targetPort: http
    env:
      - name: PORT
        value: "3200"
      - name: NEXT_PUBLIC_API_BASE_URL
        value: '{{ .Values.global.publicScheme }}://api.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: NEXT_PUBLIC_VOICE_API_BASE_URL
        value: '{{ .Values.global.publicScheme }}://voice.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: NEXT_PUBLIC_GRAFANA_URL
        value: '{{ .Values.global.publicScheme }}://grafana.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: NEXT_PUBLIC_ADMIN_WEB_URL
        value: '{{ .Values.global.publicScheme }}://admin.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: KEYCLOAK_URL
        value: '{{ .Values.global.publicScheme }}://keycloak.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
      - name: KEYCLOAK_REALM
        value: uap
      - name: NEXT_PUBLIC_LIVEKIT_URL
        value: '{{ .Values.global.livekitScheme }}://livekit.{{ .Values.global.baseDomain }}:{{ .Values.global.livekitPort }}'
      - name: NEXT_PUBLIC_APP_URL
        value: '{{ .Values.global.publicScheme }}://chat.{{ .Values.global.baseDomain }}:{{ .Values.global.externalPort }}'
    probes:
      startup:
        path: /api/health
        port: http
        failureThreshold: 30
        periodSeconds: 5
      readiness:
        path: /api/health
        port: http
      liveness:
        path: /api/health
        port: http
  admin-api:
    replicas: 1
    mesh: true
    image:
      repository: uap/admin-api
      tag: dev
    containerPorts:
      - name: http
        containerPort: 8080
    service:
      enabled: true
      ports:
        - name: http
          port: 8080
          targetPort: http
    env:
      - name: HTTP_PORT
        value: "8080"
      - name: DATABASE_URL
        secretKeyRef:
          name: uap-platform-secrets
          key: platform-database-url
      - name: INDEXER_URL
