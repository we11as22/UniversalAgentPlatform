statefulWorkloads:
  postgres:
    image:
      repository: postgres
      tag: "16.8"
    containerPorts:
      - name: postgres
        containerPort: 5432
    service:
      enabled: true
      ports:
        - name: postgres
          port: 5432
          targetPort: postgres
    env:
      - name: POSTGRES_DB
        secretKeyRef:
          name: uap-platform-secrets
          key: postgres-database
      - name: POSTGRES_USER
        secretKeyRef:
          name: uap-platform-secrets
          key: postgres-user
      - name: POSTGRES_PASSWORD
        secretKeyRef:
          name: uap-platform-secrets
          key: postgres-password
    dataMountPath: /var/lib/postgresql/data
    volumes:
      - name: postgres-init
        configMap:
          name: postgres-init
          defaultMode: 493
      - name: postgres-migrations
        configMap:
          name: postgres-migrations
      - name: postgres-seeds
        configMap:
          name: postgres-seeds
    volumeMounts:
      - name: data
        mountPath: /var/lib/postgresql/data
      - name: postgres-init
        mountPath: /docker-entrypoint-initdb.d
        readOnly: true
      - name: postgres-migrations
        mountPath: /bootstrap/migrations
        readOnly: true
      - name: postgres-seeds
        mountPath: /bootstrap/seeds
        readOnly: true
    persistence:
      enabled: false
      size: 20Gi
    probes:
      readiness:
        exec:
          command:
            - /bin/sh
            - -c
            - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
      liveness:
        exec:
          command:
            - /bin/sh
            - -c
            - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
  redis:
    image:
      repository: redis
      tag: "7.4"
    command:
      - redis-server
    args:
      - --appendonly
      - "yes"
    containerPorts:
      - name: redis
        containerPort: 6379
    service:
      enabled: true
      ports:
        - name: redis
          port: 6379
          targetPort: redis
    dataMountPath: /data
    volumeMounts:
      - name: data
        mountPath: /data
    persistence:
      enabled: false
      size: 8Gi
    probes:
      readiness:
        exec:
          command: ["redis-cli", "ping"]
      liveness:
        exec:
          command: ["redis-cli", "ping"]
  kafka:
    image:
      repository: apache/kafka
      tag: 3.9.0
    containerPorts:
      - name: kafka
        containerPort: 9092
      - name: controller
        containerPort: 9093
    service:
      enabled: true
      ports:
        - name: kafka
          port: 9092
          targetPort: kafka
        - name: controller
          port: 9093
          targetPort: controller
    env:
      - name: KAFKA_NODE_ID
        value: "1"
      - name: KAFKA_PROCESS_ROLES
        value: broker,controller
      - name: KAFKA_LISTENERS
        value: PLAINTEXT://:9092,CONTROLLER://:9093
      - name: KAFKA_ADVERTISED_LISTENERS
        value: PLAINTEXT://kafka:9092
      - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
        value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - name: KAFKA_CONTROLLER_LISTENER_NAMES
        value: CONTROLLER
      - name: KAFKA_CONTROLLER_QUORUM_VOTERS
        value: 1@kafka:9093
      - name: KAFKA_INTER_BROKER_LISTENER_NAME
        value: PLAINTEXT
      - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
        value: "1"
      - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
        value: "1"
      - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
        value: "1"
    dataMountPath: /var/lib/kafka/data
    volumeMounts:
      - name: data
        mountPath: /var/lib/kafka/data
    persistence:
      enabled: false
      size: 20Gi
    probes:
