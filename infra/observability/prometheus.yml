global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: platform
    static_configs:
      - targets:
          - chat-gateway:8080
          - admin-api:8080
          - conversation-service:8080
          - agent-router:8080
          - provider-gateway:8080
          - voice-gateway:8080
          - quota-service:8080
          - audit-service:8080
          - transcript-service:8080

