services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.12-py3
    command:
      - tritonserver
      - --model-repository=/models
      - --http-port=8000
      - --grpc-port=8001
      - --metrics-port=8002
    ports:
      - "8000:8000"
      - "8006:8001"
      - "8007:8002"
    volumes:
      - ../triton/model-repository:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

