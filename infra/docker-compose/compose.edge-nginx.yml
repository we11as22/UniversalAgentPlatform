services:
  nginx-edge:
    image: nginx:1.27-alpine
    network_mode: host
    environment:
      UAP_BASE_DOMAIN: ${UAP_BASE_DOMAIN:-uap.localtest.me}
      UAP_EDGE_CHAT_TARGET: ${UAP_EDGE_CHAT_TARGET:-127.0.0.1:3200}
      UAP_EDGE_ADMIN_TARGET: ${UAP_EDGE_ADMIN_TARGET:-127.0.0.1:3300}
      UAP_EDGE_API_TARGET: ${UAP_EDGE_API_TARGET:-127.0.0.1:3220}
      UAP_EDGE_ADMIN_API_TARGET: ${UAP_EDGE_ADMIN_API_TARGET:-127.0.0.1:3210}
      UAP_EDGE_GRAFANA_TARGET: ${UAP_EDGE_GRAFANA_TARGET:-127.0.0.1:13000}
      UAP_EDGE_PROMETHEUS_TARGET: ${UAP_EDGE_PROMETHEUS_TARGET:-127.0.0.1:19090}
      UAP_EDGE_KEYCLOAK_TARGET: ${UAP_EDGE_KEYCLOAK_TARGET:-127.0.0.1:18081}
      UAP_EDGE_TEMPORAL_TARGET: ${UAP_EDGE_TEMPORAL_TARGET:-127.0.0.1:18088}
      UAP_EDGE_MINIO_TARGET: ${UAP_EDGE_MINIO_TARGET:-127.0.0.1:19001}
      UAP_EDGE_LIVEKIT_TARGET: ${UAP_EDGE_LIVEKIT_TARGET:-127.0.0.1:17882}
    volumes:
      - ../nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
